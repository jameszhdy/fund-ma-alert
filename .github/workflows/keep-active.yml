name: 保持仓库活跃（防止60天自动禁用）

on:
  schedule:
    - cron: '0 0 */30 * *'   # 每30天执行一次（UTC时间0点）
  workflow_dispatch:          # 允许手动立即运行

jobs:
  keep-active:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 必须有写权限才能提交commit
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # 自动生成，无需手动创建

      - name: 创建空commit（刷活跃度）
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: 自动保持仓库活跃（防止60天禁用）"
          git push
